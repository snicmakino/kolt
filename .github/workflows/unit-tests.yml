name: Unit tests

# Runs `kolt test` on every push and PR. Complements the self-host smoke
# workflow: smoke verifies the build pipeline end-to-end, this job catches
# unit-level regressions in build / resolve / config / infra logic before
# they reach main.
#
# Bootstrap policy: KOLT_BOOTSTRAP_TAG pins the past kolt release whose
# kolt.kexe is used to build/test current HEAD. The pin must always
# trail HEAD by at least one published release. If a build fails because
# the pinned tag is broken, roll back to the previous working tag in the
# env below (one-line PR). The tag must be reachable via `gh release
# download` and ship `kolt-<version>-linux-x64.tar.gz`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KOLT_BOOTSTRAP_TAG: v0.16.3
  # Run the bootstrap kolt from inside the extracted release tree so
  # `DaemonJarResolver` can find `libexec/<daemon>/*.jar` siblings and
  # spawn the warm daemon. Copying the binary out (as the original
  # bootstrap step did) detached it from libexec/ and silently forced
  # subprocess compile. See #302.
  BOOTSTRAP_DIR: /tmp/kolt-bootstrap
  BOOTSTRAP_KOLT: /tmp/kolt-bootstrap/bin/kolt   # = $BOOTSTRAP_DIR/bin/kolt; kept literal because YAML env entries cannot reference each other.

jobs:
  linuxX64-test:
    name: linuxX64Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # libcurl headers are required by the libcurl cinterop binding that
      # compiles as part of the main klib that tests depend on.
      - name: Install libcurl dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Install libarchive dev headers
        run: sudo apt-get install -y --no-install-recommends libarchive-dev

      # kolt downloads its own kotlinc / konanc / JDK into ~/.kolt on first
      # run. Cache keyed on the Kotlin version from kolt.toml.
      - name: Cache kolt toolchains
        uses: actions/cache@v4
        with:
          path: ~/.kolt
          key: kolt-${{ runner.os }}-${{ hashFiles('kolt.toml') }}
          restore-keys: |
            kolt-${{ runner.os }}-

      - name: Download bootstrap kolt.kexe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$BOOTSTRAP_DIR"
          gh release download "$KOLT_BOOTSTRAP_TAG" \
            --repo snicmakino/kolt \
            --pattern 'kolt-*-linux-x64.tar.gz' \
            --dir "$BOOTSTRAP_DIR"
          tar -xzf "$BOOTSTRAP_DIR"/kolt-*-linux-x64.tar.gz \
            -C "$BOOTSTRAP_DIR" --strip-components=1
          "$BOOTSTRAP_KOLT" --version

      # `--ktest_logger=SILENT` collapses the per-test GTEST output (~2k
      # lines for the full suite) down to a summary; failure stack traces
      # still surface on stderr. The `::group::` markers fold the step
      # output in the GHA UI by default.
      - name: Run kolt test
        run: |
          set -euo pipefail
          echo "::group::kolt test"
          "$BOOTSTRAP_KOLT" test -- --ktest_logger=SILENT
          echo "::endgroup::"

      # Early-detection guard: build the JVM daemon project standalone with
      # the bootstrap kolt and assert the thin jar materializes. self-host-
      # smoke job 2 covers the same surface end-to-end, but running it here
      # at the PR-gating job catches a `kolt build` regression in the daemon
      # subproject before the smoke workflow's longer path.
      #
      # Daemon-path canary: this step builds a JVM target and therefore
      # exercises the JVM compiler daemon. The pre-#302 bug surfaced as
      # `kolt-jvm-compiler-daemon jar not found — falling back to
      # subprocess compile`, which short-circuited before any spawn
      # attempt. The canary requires `starting compiler daemon` in stderr
      # — i.e. the daemon code path was reached. Whether the spawn itself
      # connects within the retry budget is orthogonal: #310 raised the
      # budget to 10s in the dev tree, but the bootstrap tag here still
      # ships 3s, so the negative assertion (no `falling back to
      # subprocess`) is gated on the next bootstrap bump.
      - name: Verify daemon thin jar builds standalone
        run: |
          set -euo pipefail
          cd kolt-jvm-compiler-daemon
          "$BOOTSTRAP_KOLT" build 2> >(tee kolt-build.stderr >&2)
          test -f build/debug/kolt-jvm-compiler-daemon.jar
          if ! grep -q 'starting compiler daemon' kolt-build.stderr; then
            echo "Canary failed: bootstrap kolt did not reach the daemon spawn path (jar resolution likely failed)" >&2
            exit 1
          fi
          echo "Canary OK: daemon spawn path was reached"
