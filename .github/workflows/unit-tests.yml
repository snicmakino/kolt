name: Unit tests

# Runs the linuxX64Test gradle task on every push and PR. Complements the
# self-host smoke workflow: smoke verifies the build pipeline end-to-end,
# this job catches unit-level regressions in build / resolve / config /
# infra logic before they reach main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linuxX64-test:
    name: linuxX64Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # libcurl headers are required by the libcurl cinterop binding that
      # compiles as part of the main klib that tests depend on.
      - name: Install libcurl dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      # Cache keys deliberately mirror self-host-smoke.yml so the two
      # workflows share underlying cache entries (keyed per repo, not per
      # workflow). First run of either populates the caches for both.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Gradle Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('build.gradle.kts') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Run linuxX64Test
        run: ./gradlew --no-daemon linuxX64Test

      # Regression guard for the root `build` → `:kolt-jvm-compiler-daemon:build`
      # wiring added in #99 (ADR 0018). If a future edit drops the `dependsOn`
      # in build.gradle.kts, the dev-fallback path in DaemonJarResolver.kt
      # would silently pick up a stale jar — the failure mode is invisible to
      # self-host-smoke because the daemon falls back to subprocess compile on
      # any error. Asserting the jar exists after `./gradlew build` keeps the
      # wiring honest. linuxX64 tasks above have already populated the Kotlin
      # Native and Gradle caches, so the only real work here is the daemon's
      # shadowJar (a few seconds).
      - name: Verify root build produces daemon fat jar
        run: |
          ./gradlew --no-daemon build
          test -f kolt-jvm-compiler-daemon/build/libs/kolt-jvm-compiler-daemon-all.jar
