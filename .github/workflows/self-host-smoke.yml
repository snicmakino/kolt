name: Self-host smoke test

# Builds kolt.kexe from its own kolt.toml as a smoke test against HEAD.
# See #61 — this is the minimum signal that the self-host path stays
# unbroken across changes. A Gradle-built kolt.kexe bootstraps itself
# to rebuild kolt from kolt.toml, and we verify the resulting binary
# responds to `--version`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-host:
    name: Self-host build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # libcurl headers are required by the libcurl cinterop binding.
      - name: Install libcurl dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Gradle's Kotlin Native plugin downloads konanc (~500 MB) into ~/.konan.
      # Caching keeps runs under ~2 minutes after the first cold build. Keyed
      # on build.gradle.kts because that's where the Kotlin (and therefore
      # konanc) version lives for the Gradle path.
      - name: Cache Gradle Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('build.gradle.kts') }}
          restore-keys: |
            konan-${{ runner.os }}-

      # kolt downloads its own kotlinc / konanc / JDK into ~/.kolt on first
      # run. Cache keyed on the Kotlin version from kolt.toml.
      - name: Cache kolt toolchains
        uses: actions/cache@v4
        with:
          path: ~/.kolt
          key: kolt-${{ runner.os }}-${{ hashFiles('kolt.toml') }}
          restore-keys: |
            kolt-${{ runner.os }}-

      - name: Bootstrap kolt.kexe via Gradle
        run: ./gradlew --no-daemon linkDebugExecutableLinuxX64

      - name: Self-host build (kolt builds itself from kolt.toml)
        run: ./build/bin/linuxX64/debugExecutable/kolt.kexe build

      - name: Verify self-hosted binary
        run: |
          set -euo pipefail
          version=$(./build/debug/kolt.kexe --version)
          echo "$version"
          echo "$version" | grep -Eq '^kolt [0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'

      - name: Upload kolt kexe artifact
        uses: actions/upload-artifact@v4
        with:
          name: kolt-kexe
          path: ./build/bin/linuxX64/debugExecutable/kolt.kexe
          if-no-files-found: error
          retention-days: 1

  # Companion job — exercises the full self-host path end to end on top of the
  # kolt.kexe that the `self-host` job just uploaded: 3 × `kolt build` + the
  # assemble-dist stitcher + a tarball install + a fixture smoke build via the
  # installed `bin/kolt`. A failure in any step fails the job (and therefore
  # the workflow) by GHA default + `set -euo pipefail` in each shell block.
  self-host-post:
    name: Self-host post-migration path
    needs: self-host
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # libcurl headers are required by the libcurl cinterop binding; kolt.kexe
      # links against the runner's libcurl at load time.
      - name: Install libcurl dev headers
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      # kolt downloads its own kotlinc / konanc / JDK into ~/.kolt on first
      # run. Share the cache key with the native self-host job so warm runs
      # skip the ~minute of first-boot toolchain fetches.
      - name: Cache kolt toolchains
        uses: actions/cache@v4
        with:
          path: ~/.kolt
          key: kolt-${{ runner.os }}-${{ hashFiles('kolt.toml') }}
          restore-keys: |
            kolt-${{ runner.os }}-

      - name: Download kolt.kexe artifact
        uses: actions/download-artifact@v4
        with:
          name: kolt-kexe
          path: ./bootstrap-kexe

      - name: Prepare kolt.kexe
        run: |
          set -euo pipefail
          chmod +x ./bootstrap-kexe/kolt.kexe
          ./bootstrap-kexe/kolt.kexe --version

      - name: kolt build at root
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/bootstrap-kexe/kolt.kexe" build

      - name: kolt build at kolt-jvm-compiler-daemon
        run: |
          set -euo pipefail
          cd kolt-jvm-compiler-daemon
          "$GITHUB_WORKSPACE/bootstrap-kexe/kolt.kexe" build

      - name: kolt build at kolt-native-compiler-daemon
        run: |
          set -euo pipefail
          cd kolt-native-compiler-daemon
          "$GITHUB_WORKSPACE/bootstrap-kexe/kolt.kexe" build

      - name: Assemble tarball
        run: |
          set -euo pipefail
          KOLT="$GITHUB_WORKSPACE/bootstrap-kexe/kolt.kexe" ./scripts/assemble-dist.sh

      - name: Read kolt.toml version
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^version = "' kolt.toml | head -n 1 | sed -E 's/^version = "(.*)"/\1/')
          echo "KOLT_TOML_VERSION=$VERSION" >> "$GITHUB_ENV"

      # Local HTTP server lets install.sh exercise its real download +
      # SHA-256 + extract + sed + symlink path against the assembled tarball
      # without needing a published GitHub Release.
      - name: Set up local serve directory
        run: |
          set -euo pipefail
          SERVE_DIR=$(mktemp -d)
          cp "dist/kolt-${KOLT_TOML_VERSION}-linux-x64.tar.gz" "$SERVE_DIR/"
          cp "dist/kolt-${KOLT_TOML_VERSION}-linux-x64.tar.gz.sha256" "$SERVE_DIR/"
          : > "$SERVE_DIR/YANKED"
          echo "SERVE_DIR=$SERVE_DIR" >> "$GITHUB_ENV"

      - name: Start local HTTP server
        run: |
          set -euo pipefail
          python3 -m http.server 8000 --bind 127.0.0.1 --directory "$SERVE_DIR" \
            >/dev/null 2>&1 &
          echo "HTTP_PID=$!" >> "$GITHUB_ENV"
          # Give the server a moment to bind before the first curl.
          for _ in 1 2 3 4 5; do
            curl -fsS "http://127.0.0.1:8000/YANKED" >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Install via install.sh — happy path
        env:
          KOLT_TEST_BASE_URL: http://127.0.0.1:8000
          KOLT_TEST_YANKED_URL: http://127.0.0.1:8000/YANKED
        run: |
          set -euo pipefail
          KOLT_VERSION="$KOLT_TOML_VERSION" sh ./install.sh
          OUTPUT=$("$HOME/.local/bin/kolt" --version)
          if [ "$OUTPUT" != "kolt $KOLT_TOML_VERSION" ]; then
            echo "Happy path failed: expected 'kolt $KOLT_TOML_VERSION', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Happy path OK: $OUTPUT"

      # Fixture smoke: drive `<install>/bin/kolt build` on a minimal JVM
      # app via the installer-managed dir, end-to-end signal that the 3 ×
      # kolt build → assemble-dist → install.sh chain produced a working
      # install.
      - name: Smoke-build fixture with installed kolt
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/share/kolt/$KOLT_TOML_VERSION"
          cd spike/daemon-self-host-smoke
          rm -rf build
          "${INSTALL_DIR}/bin/kolt" build
          test -f build/debug/smoke.jar

      - name: Stop local HTTP server
        if: always()
        run: |
          if [ -n "${HTTP_PID:-}" ]; then
            kill "$HTTP_PID" 2>/dev/null || true
          fi
